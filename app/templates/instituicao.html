<!DOCTYPE html>
<html lang="Pt-br">
<head>
    <meta charset="UTF-8">
    <title>Instituições - Sistema Acadêmico</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <a href="/" class="navbar-brand">Acadêmico</a>
    </nav>

    <div class="container mt-5">
        <h2>Instituições de Ensino</h2>
        <div class="row mt-4">
            {% for inst in instituicoes %}
            <div class="col-md-6">
                <div class="card border-primary mb-3">
                    <div class="card-body">
                        <h5 class="card-title">{{ inst.nome }}</h5>
                        <p class="card-text">
                            <strong>Site:</strong> <a href="{{ inst.site }}" target="_blank">{{ inst.site }}</a><br>
                            <strong>Telefone:</strong> {{ inst.telefone }}<br>
                            <strong>Localização:</strong> {{ inst.cidade }}
                        </p>
                    </div>
                </div>
            </div>
            {% empty %}
            <p class="col-12 text-center">Nenhuma instituição encontrada.</p>
            {% endfor %}
        </div>
        <a href="/" class="btn btn-secondary">Voltar</a>
    </div>
</body>
</html>
