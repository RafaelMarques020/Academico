<div class="container mt-4">
    <h2>Cursos Cadastrados</h2>
    <ul class="list-group">
        {% for curso in cursos %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            {{ curso.nome }}
            <span class="badge badge-primary badge-pill">{{ curso.carga_horaria_total }}h</span>
        </li>
        {% endfor %}
    </ul>
</div>
