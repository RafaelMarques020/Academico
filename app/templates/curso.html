<!DOCTYPE html>
<html lang="Pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cursos - Sistema Acadêmico</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <a href="/" class="navbar-brand">Acadêmico</a>
    </nav>

    <div class="container mt-5">
        <h2 class="text-primary">Cursos Oferecidos</h2>
        <table class="table table-bordered table-hover mt-4">
            <thead class="bg-primary text-white">
                <tr>
                    <th>Nome do Curso</th>
                    <th>Carga Horária Total</th>
                    <th>Instituição</th>
                    <th>Área</th>
                </tr>
            </thead>
            <tbody>
                {% for curso in cursos %}
                <tr>
                    <td>{{ curso.nome }}</td>
                    <td>{{ curso.carga_horaria_total }} horas</td>
                    <td>{{ curso.instituicao }}</td>
                    <td>{{ curso.area_saber }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="4" class="text-center">Nenhum curso cadastrado.</td></tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/" class="btn btn-dark">Voltar ao Menu</a>
    </div>
</body>
</html>
