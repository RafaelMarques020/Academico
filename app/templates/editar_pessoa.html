<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Pessoa - Sistema Acadêmico</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <a href="/" class="navbar-brand">Acadêmico</a>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card">
                    <div class="card-header bg-warning text-dark">
                        <h3 class="mb-0">Editar Cadastro: {{ pessoa.nome }}</h3>
                    </div>
                    <div class="card-body">
                        {% load crispy_forms_tags %}
                        <form method="post" novalidate>
                            {% csrf_token %}
                            {% crispy form %}
                        </form>
                    </div>
                    <div class="card-footer">
                        <a href="{% url 'pessoa' %}" class="btn btn-secondary">Cancelar e Voltar</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
