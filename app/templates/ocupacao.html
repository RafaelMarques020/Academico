<!DOCTYPE html>
<html lang="Pt-br">
<head>
    <meta charset="UTF-8">
    <title>Ocupações - Sistema Acadêmico</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <a href="/" class="navbar-brand">Acadêmico</a>
    </nav>

    <div class="container mt-5">
        <div class="card">
            <div class="card-header bg-info text-white"><h2>Ocupações de Pessoas</h2></div>
            <div class="card-body">
                <ul class="list-group">
                    {% for ocupacao in ocupacoes %}
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        {{ ocupacao.nome }}
                    </li>
                    {% empty %}
                    <li class="list-group-item">Nenhuma ocupação cadastrada.</li>
                    {% endfor %}
                </ul>
            </div>
        </div>
        <br>
        <a href="/" class="btn btn-secondary">Voltar para Início</a>
    </div>
</body>
</html>
