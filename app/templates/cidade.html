<!DOCTYPE html>
<html lang="Pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cidades - Sistema Acadêmico</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <a href="/" class="navbar-brand">Acadêmico</a>
    </nav>

    <div class="container mt-5">
        <h2>Cidades</h2>
        <table class="table table-striped mt-4">
            <thead class="thead-dark">
                <tr>
                    <th>ID</th>
                    <th>Nome da Cidade</th>
                    <th>UF (Estado)</th>
                </tr>
            </thead>
            <tbody>
                {% for cidade in cidades %}
                <tr>
                    <td>{{ cidade.id }}</td>
                    <td>{{ cidade.nome }}</td>
                    <td>{{ cidade.uf }}</td>
                </tr>
                {% empty %}
                <tr><td colspan="3" class="text-center">Nenhuma cidade cadastrada.</td></tr>
                {% endfor %}
            </tbody>
        </table>
        <a href="/" class="btn btn-secondary">Voltar</a>
    </div>
</body>
</html>
