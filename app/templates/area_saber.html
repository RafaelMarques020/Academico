<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Áreas do Saber</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <a href="/" class="navbar-brand">Acadêmico</a>
    <ul class="navbar-nav">
        <li class="nav-item"><a class="nav-link text-white" href="/">Home</a></li>
        <li class="nav-item"><a class="nav-link text-white" href="/area-saber/">Áreas</a></li>
    </ul>
</nav>

<div class="container mt-5">
    <h2>Áreas do Saber</h2>

    <table class="table table-bordered table-hover">
        <thead class="thead-dark">
            <tr><th>Nome</th></tr>
        </thead>
        <tbody>
            {% for area in areas %}
            <tr><td>{{ area.nome }}</td></tr>
            {% empty %}
            <tr><td class="text-center">Nenhuma área cadastrada.</td></tr>
            {% endfor %}
        </tbody>
    </table>
</div>

</body>
</html>
