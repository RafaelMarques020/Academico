<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Turnos</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <a href="/" class="navbar-brand">Acadêmico</a>
</nav>

<div class="container mt-5">
    <h2>Turnos</h2>

    <table class="table table-bordered">
        <thead class="thead-dark">
            <tr><th>Nome</th></tr>
        </thead>
        <tbody>
            {% for turno in turnos %}
            <tr><td>{{ turno.nome }}</td></tr>
            {% empty %}
            <tr><td class="text-center">Nenhum turno cadastrado.</td></tr>
            {% endfor %}
        </tbody>
    </table>
    <div class="mt-3">
        <a href="/" class="btn btn-secondary">Voltar ao Início</a>
    </div>
</div>

</body>
</html>
